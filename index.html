<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, interactive-widget=resizes-content"
    />
    <title>IST to London Time</title>
    <style>
      :root {
        --bg: #f5f5f7;
        --card-bg: #ffffff;
        --text-primary: #1a1a1a;
        --text-secondary: #6b6b6b;
        --accent: #2f6fed;
        --border: #e2e2e5;
      }
      [data-theme="dark"] {
        --bg: #16171a;
        --card-bg: #1f2023;
        --text-primary: #f2f2f2;
        --text-secondary: #9a9a9a;
        --accent: #5b8fff;
        --border: #2e2f33;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
      }
      body {
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        padding: 1rem;
      }
      .card {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 2rem 1.5rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
      }
      .toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-bottom: 1.5rem;
      }
      button {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        padding: 0 16px;
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      #theme-toggle {
        width: 44px;
        padding: 0;
      }
      .label {
        text-align: center;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 4px;
      }
      .time {
        text-align: center;
        font-size: 13vw;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.02em;
      }
      @media (min-width: 480px) {
        .time {
          font-size: 52px;
        }
      }
      .time.accent {
        color: var(--accent);
      }
      .zone {
        text-align: center;
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 2px;
      }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: var(--border);
        margin: 2rem 0;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      }
      input[type="range"]::-moz-range-thumb {
        width: 26px;
        height: 26px;
        border: none;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="toolbar">
        <button id="fmt-toggle">24h</button>
        <button id="theme-toggle" aria-label="Toggle dark mode">
          <svg
            id="theme-icon"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>

      <div class="label">India (IST)</div>
      <div class="time" id="ist-out">12:00</div>

      <input
        type="range"
        id="slider"
        min="0"
        max="1425"
        step="15"
        value="720"
      />

        <div class="label">London</div>
        <div class="time accent" id="london-out">07:30</div>
        <div class="zone" id="london-zone">GMT</div>
    </div>

    <script>
      (function () {
        var slider = document.getElementById("slider");
        var istOut = document.getElementById("ist-out");
        var londonOut = document.getElementById("london-out");
        var londonZone = document.getElementById("london-zone");
        var fmtToggle = document.getElementById("fmt-toggle");
        var themeToggle = document.getElementById("theme-toggle");
        var themeIcon = document.getElementById("theme-icon");

        var sunPath =
          '<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>';
        var moonPath =
          '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';

        var sampleDate = new Date(2000, 0, 1, 22, 0, 0);
        var timeString = new Intl.DateTimeFormat([], {
          hour: "numeric",
        }).format(sampleDate);
        var is24 = !/am|pm/i.test(timeString);
        fmtToggle.textContent = is24 ? "24h" : "12h";

        var now = new Date();
        var currentHours = now.getHours();
        var currentMinutes = now.getMinutes();
        var totalCurrentMinutes = currentHours * 60 + currentMinutes;
        var initialMinutes = Math.ceil(totalCurrentMinutes / 15) * 15;
        if (initialMinutes > 1425) {
          initialMinutes = 0;
        }
        slider.value = initialMinutes;

        var systemDarkQuery = window.matchMedia("(prefers-color-scheme: dark)");
        var isDark = systemDarkQuery.matches;

        function applyTheme(dark) {
          isDark = dark;
          document.documentElement.setAttribute(
            "data-theme",
            isDark ? "dark" : "light",
          );
          themeIcon.innerHTML = isDark ? sunPath : moonPath;
        }

        applyTheme(isDark);

        systemDarkQuery.addEventListener("change", function (e) {
          applyTheme(e.matches);
        });

        function formatTime(hours, minutes, use24) {
          if (use24) {
            return (
              String(hours).padStart(2, "0") +
              ":" +
              String(minutes).padStart(2, "0")
            );
          }
          var period = hours >= 12 ? "pm" : "am";
          var h12 = hours % 12;
          if (h12 === 0) h12 = 12;
          return h12 + ":" + String(minutes).padStart(2, "0") + " " + period;
        }

        function update() {
          var totalMin = parseInt(slider.value, 10);
          var istH = Math.floor(totalMin / 60);
          var istM = totalMin % 60;
          istOut.textContent = formatTime(istH, istM, is24);

          var now = new Date();
          var y = now.getFullYear(),
            mo = now.getMonth(),
            d = now.getDate();
          var utcMillis =
            Date.UTC(y, mo, d, istH, istM) - (5 * 60 + 30) * 60 * 1000;
          var utcDate = new Date(utcMillis);

          var londonFormatter = new Intl.DateTimeFormat("en-GB", {
            timeZone: "Europe/London",
            hour: "numeric",
            minute: "2-digit",
            hour12: !is24,
          });
          var parts = londonFormatter.formatToParts(utcDate);
          var hh,
            mm,
            dayPeriod = "";
          parts.forEach(function (p) {
            if (p.type === "hour") hh = p.value;
            if (p.type === "minute") mm = p.value;
            if (p.type === "dayPeriod") dayPeriod = p.value;
          });
          if (is24) hh = String(hh).padStart(2, "0");
          londonOut.textContent =
            hh + ":" + mm + (dayPeriod ? " " + dayPeriod : "");

          var tzFormatter = new Intl.DateTimeFormat("en-GB", {
            timeZone: "Europe/London",
            timeZoneName: "short",
          });
          var tzParts = tzFormatter.formatToParts(utcDate);
          var tzName = tzParts.find(function (p) {
            return p.type === "timeZoneName";
          });
          londonZone.textContent = tzName ? tzName.value : "";
        }

        slider.addEventListener("input", update);

        fmtToggle.addEventListener("click", function () {
          is24 = !is24;
          fmtToggle.textContent = is24 ? "24h" : "12h";
          update();
        });

        themeToggle.addEventListener("click", function () {
          applyTheme(!isDark);
        });

        update();
      })();
    </script>
  </body>
</html>
